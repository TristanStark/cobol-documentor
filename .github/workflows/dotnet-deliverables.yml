name: C# CI and deliverables

on:
  pull_request:
    branches:
      - master
      - main
      - feature/**
  push:
    tags:
      - "v*"
      - "release-*"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore CobolDocumentor.CSharp.sln

      - name: Build
        shell: bash
        run: |
          set -o pipefail
          dotnet build CobolDocumentor.CSharp.sln --configuration Release --no-restore 2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: ignore

      - name: Test
        run: dotnet test CobolDocumentor.CSharp.sln --configuration Release --no-build --logger trx --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/*.trx
          if-no-files-found: ignore

  deliverables:
    name: Publish deliverables
    runs-on: ubuntu-latest
    needs: build-test
    strategy:
      fail-fast: false
      matrix:
        runtime:
          - linux-x64
          - win-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Compute version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            echo "value=pr-${{ github.event.pull_request.number }}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish CLI
        run: >-
          dotnet publish src/CobolDocumentor.Cli/CobolDocumentor.Cli.csproj
          --configuration Release
          --runtime ${{ matrix.runtime }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=None
          -p:DebugSymbols=false
          --output publish/${{ matrix.runtime }}

      - name: Add documentation to deliverable
        shell: bash
        run: |
          cp README.md publish/${{ matrix.runtime }}/README.md
          cp CobolDocumentor.CSharp.sln publish/${{ matrix.runtime }}/CobolDocumentor.CSharp.sln

      - name: Create ZIP deliverable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $name = "CobolDocumentor-${{ steps.version.outputs.value }}-${{ matrix.runtime }}.zip"
          Compress-Archive -Path "publish/${{ matrix.runtime }}/*" -DestinationPath "dist/$name" -Force

      - name: Upload PR/tag deliverable artifact
        uses: actions/upload-artifact@v4
        with:
          name: CobolDocumentor-${{ steps.version.outputs.value }}-${{ matrix.runtime }}
          path: dist/*.zip
          if-no-files-found: error

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: deliverables
    if: github.ref_type == 'tag'

    steps:
      - name: Download deliverables
        uses: actions/download-artifact@v4
        with:
          pattern: CobolDocumentor-${{ github.ref_name }}-*
          path: dist
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/*.zip --clobber
          else
            gh release create "$tag" dist/*.zip --title "$tag" --generate-notes
          fi
